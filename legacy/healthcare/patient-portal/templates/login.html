<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal - Login</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="24" fill="#3ECF8E"/>
                    <path d="M24 14v20M14 24h20" stroke="white" stroke-width="4" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>Patient Portal</h1>
            <p>Your discharge instructions and care plan</p>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="patientId">Patient ID</label>
                <input type="text" id="patientId" name="patient_id" required
                       placeholder="Enter your patient ID" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="accessCode">Access Code</label>
                <input type="password" id="accessCode" name="access_code" required
                       placeholder="4-digit access code" maxlength="4" inputmode="numeric" pattern="[0-9]*">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <div class="login-footer">
            <p>Need help? Call your care team at <strong>1-800-XXX-XXXX</strong></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    const result = await res.json();
                    window.location.href = `/dashboard?session_id=${result.session_id}`;
                } else {
                    const err = await res.json();
                    alert(err.detail || 'Login failed');
                }
            } catch (err) {
                alert('Connection error. Please try again.');
            }
        });
    </script>
</body>
</html>
