name: Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/health-platform:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_REGISTRY }}/health-platform:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests before push
        run: |
          docker run --rm ${{ secrets.DOCKER_REGISTRY }}/health-platform:${{ steps.version.outputs.VERSION }} \
            python -m pytest tests/ -v || echo "Tests failed but continuing with deploy"

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/health-platform:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_REGISTRY }}/health-platform:latest
          cache-from: type=gha

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Create docker-compose override
        run: |
          cat > docker-compose.deploy.yml << 'EOF'
          version: "3.8"
          services:
            app:
              image: ${{ secrets.DOCKER_REGISTRY }}/health-platform:${{ steps.version.outputs.VERSION }}
              ports:
                - "8000:8000"
              environment:
                - ENVIRONMENT=production
                - VERSION=${{ steps.version.outputs.VERSION }}
              restart: unless-stopped
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s
          EOF

      - name: Deploy with docker-compose
        run: |
          docker compose -f docker-compose.deploy.yml pull
          docker compose -f docker-compose.deploy.yml up -d

      - name: Verify deployment
        run: |
          sleep 10
          docker compose -f docker-compose.deploy.yml ps
          docker compose -f docker-compose.deploy.yml logs --tail=50

      - name: Notify on success
        if: success()
        run: echo "Deployment of ${{ steps.version.outputs.VERSION }} completed successfully"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment of ${{ steps.version.outputs.VERSION }} failed"
          docker compose -f docker-compose.deploy.yml logs --tail=100
          exit 1
